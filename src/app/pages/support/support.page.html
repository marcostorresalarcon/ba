<section class="mt-5 space-y-6">
  <div class="rounded-[2.5rem] border border-fog/60 bg-white/95 p-6 shadow-brand">
    <p class="text-xs font-semibold uppercase tracking-[0.35em] text-clay">Contact</p>
    <h2 class="mt-1 font-display text-2xl text-charcoal">Support</h2>
    <p class="mt-2 text-sm text-slate">Get in touch with our team. We're here to help.</p>

    <div class="mt-6 flex flex-wrap gap-4">
      <button
        type="button"
        (click)="openTel()"
        class="inline-flex items-center gap-2 rounded-full border border-pine/40 bg-white px-5 py-3 text-sm font-bold text-pine transition-all hover:bg-pine hover:text-white hover:shadow-raised"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
        </svg>
        Call
      </button>
      <button
        type="button"
        (click)="openSms()"
        class="inline-flex items-center gap-2 rounded-full border border-pine/40 bg-white px-5 py-3 text-sm font-bold text-pine transition-all hover:bg-pine hover:text-white hover:shadow-raised"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
        Text / iMessage
      </button>
      <button
        type="button"
        (click)="openEmail()"
        class="inline-flex items-center gap-2 rounded-full border border-pine/40 bg-white px-5 py-3 text-sm font-bold text-pine transition-all hover:bg-pine hover:text-white hover:shadow-raised"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
        </svg>
        Email
      </button>
      <button
        type="button"
        (click)="openWeb()"
        class="inline-flex items-center gap-2 rounded-full border border-pine/40 bg-white px-5 py-3 text-sm font-bold text-pine transition-all hover:bg-pine hover:text-white hover:shadow-raised"
      >
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
        </svg>
        Website
      </button>
    </div>

    <p class="mt-4 text-xs text-slate">
      {{ contact.phone }} · {{ contact.email }}
    </p>
  </div>

  <div class="rounded-[2.5rem] border border-fog/60 bg-white/95 p-6 shadow-brand">
    <h3 class="font-display text-xl text-charcoal">FAQs</h3>
    <div class="mt-4 space-y-4">
      @for (faq of faqs; track faq.question) {
      <details class="group rounded-xl border border-fog/40 bg-sand/20 p-4">
        <summary class="cursor-pointer font-medium text-charcoal">
          {{ faq.question }}
        </summary>
        <p class="mt-3 text-sm text-slate">{{ faq.answer }}</p>
      </details>
      }
    </div>
  </div>
</section>
